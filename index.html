<!DOCTYPE html>
<html lang="cs">
<head>

  <title>Happy Birthday</title>

</head>
<body>

  <main class="screen">

    <div class="border"></div>

    <div class="valorant-logo">V</div>

      <div class="balloon pink"></div>
      <div class="balloon dark"></div>
    </div>

    <div class="balloons right">
      <div class="balloon pink"></div>
      <div class="balloon dark"></div>
      <div class="balloon black"></div>
    </div>

    <section class="content">
      <p class="level">♛  19  ♛</p>

      <h1>HAPPY BIRTHDAY</h1>

      <button onclick="goNext()" class="play-btn">
        PLAY
      </button>

      <p class="bottom-text">× — ONE MORE YEAR OF BEING ICONIC — ×</p>
      <div class="heart"></div>
    </section>

    <div class="confetti"></div>

  </main>

  <script>
    function goNext() {
      window.location.href = "agents.html";
    }
  </script>
