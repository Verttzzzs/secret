<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Reward</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at center, rgba(255, 40, 130, 0.22), transparent 35%),
        radial-gradient(circle at bottom, rgba(140, 0, 90, 0.35), transparent 45%),
        linear-gradient(135deg, #05030a, #120616 55%, #030207);
      color: white;
    }

    .reward-page {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      padding: 40px;
    }

    .reward-page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(#ff3b8d 2px, transparent 2px),
        radial-gradient(#8d2cff 2px, transparent 2px),
        linear-gradient(45deg, #ff3b8d 0 8px, transparent 8px);
      background-size: 90px 90px, 130px 130px, 170px 170px;
      opacity: .28;
      animation: confetti 14s linear infinite;
    }

    @keyframes confetti {
      from { transform: translateY(-80px); }
      to { transform: translateY(80px); }
    }

    .content {
      position: relative;
      z-index: 5;
      transform: translateY(-10px);
    }

    .top-text {
      color: #ff5f9b;
      letter-spacing: 12px;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #ff2d7e;
    }

    h1 {
      font-size: clamp(4rem, 10vw, 10rem);
      color: #ff4f91;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 4px;
      text-shadow:
        0 0 18px rgba(255, 45, 126, .9),
        0 0 50px rgba(255, 45, 126, .45);
      transform: skewX(-8deg);
      margin-bottom: 10px;
    }

    .age {
      font-size: 135px;
      color: #ff7eaa;
      font-weight: 900;
      font-style: italic;
      text-shadow:
        0 0 20px #ff3b8d,
        0 0 55px rgba(255, 60, 130, .8);
      margin-bottom: 15px;
    }

    .cake {
      width: 230px;
      height: 145px;
      margin: 0 auto 35px;
      position: relative;
      border: 5px solid #ff4f91;
      border-radius: 20px 20px 35px 35px;
      box-shadow: 0 0 30px rgba(255, 50, 130, .75);
    }

    .cake::before {
      content: "";
      position: absolute;
      top: -25px;
      left: 15px;
      width: 190px;
      height: 40px;
      border: 5px solid #ff4f91;
      border-bottom: none;
      border-radius: 50%;
      background: rgba(255, 60, 130, .12);
    }

    .logo {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 50px;
      color: #ff4f91;
      font-weight: bold;
    }

    .candles {
      position: absolute;
      top: -90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
    }

    .candle {
      width: 15px;
      height: 65px;
      border: 3px solid #ff4f91;
      border-radius: 8px;
      position: relative;
      box-shadow: 0 0 15px rgba(255, 50, 130, .8);
      top: 30px;
      
    }

    .candle::before {
      content: "";
      position: absolute;
      top: -32px;
      left: 50%;
      width: 17px;
      height: 30px;
      transform: translateX(-50%);
      background: #ffb36b;
      border-radius: 50% 50% 50% 50%;
      box-shadow: 0 0 20px #ff8b3d;
      animation: flame .8s infinite alternate;
    }

    @keyframes flame {
      from { transform: translateX(-50%) scale(1); }
      to { transform: translateX(-50%) scale(1.15); }
    }

    .level {
      color: #ff6ca5;
      letter-spacing: 12px;
      font-size: 23px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .message {
      font-size: 22px;
      line-height: 1.45;
      color: #f2d8e5;
      margin-bottom: 35px;
    }

    .enjoy {
      padding: 22px 90px;
      border: 3px solid #ff4f91;
      background: rgba(40, 5, 25, .75);
      color: #ff7aaa;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      box-shadow:
        0 0 25px rgba(255, 50, 130, .75),
        inset 0 0 25px rgba(255, 50, 130, .15);
    }

    .agent-card {
      position: absolute;
      left: 130px;
      top: 190px;
      width: 300px;
      height: 470px;
      padding: 18px;
      background: #e8ddc9;
      color: #241426;
      border-radius: 15px;
      border: 3px solid #b9a78f;
      transform: rotate(-6deg);
      opacity: .38;
      filter: brightness(.7);
      box-shadow: 0 0 35px rgba(255, 50, 130, .35);
      z-index: 2;
    }

    .agent-card h2 {
      font-family: Georgia, serif;
      font-size: 42px;
      margin-bottom: 15px;
    }

    .agent-card img {
      width: 100%;
      height: 310px;
      object-fit: cover;
      border: 3px solid #241426;
    }

    .agent-card p {
      margin-top: 15px;
      font-size: 15px;
      line-height: 1.3;
      font-weight: bold;
    }

    .balloons {
      position: absolute;
      display: flex;
      gap: 18px;
      z-index: 3;
    }

    .balloons.left {
      left: 40px;
      bottom: 80px;
    }

    .balloons.right {
      right: 60px;
      top: 120px;
    }

    .balloon {
      width: 120px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 22%, #ff9ac6, #9c0f55 55%, #12030d);
      position: relative;
      box-shadow:
        inset -20px -25px 35px rgba(0,0,0,.45),
        0 0 35px rgba(255, 40, 130, .4);
    }

    .balloon.dark {
      background: radial-gradient(circle at 30% 22%, #663057, #120313 58%, #000);
    }

    .balloon.purple {
      background: radial-gradient(circle at 30% 22%, #bf4fff, #4b0f58 55%, #100313);
    }

    .balloon::after {
      content: "";
      position: absolute;
      bottom: -100px;
      left: 50%;
      width: 1px;
      height: 100px;
      background: rgba(255,255,255,.35);
    }

    .gifts {
      position: absolute;
      right: 70px;
      bottom: 45px;
      display: flex;
      gap: 18px;
      z-index: 3;
    }

    .gift {
      width: 110px;
      height: 95px;
      background: #150719;
      border: 3px solid #ff3f86;
      box-shadow: 0 0 25px rgba(255, 40, 130, .35);
      position: relative;
    }

    .gift::before {
      content: "";
      position: absolute;
      left: 45%;
      top: 0;
      width: 14px;
      height: 100%;
      background: #ff3f86;
    }

    .gift::after {
      content: "";
      position: absolute;
      top: 38%;
      left: 0;
      width: 100%;
      height: 14px;
      background: #ff3f86;
    }

    @media (max-width: 1000px) {
      .agent-card,
      .balloons,
      .gifts {
        display: none;
      }

      .enjoy {
        padding: 18px 35px;
        font-size: 20px;
      }

      .age {
      font-size: 160px;
      font-weight: 900;
      color: #ff6ea8;
      margin: 10px 0 25px;
      text-shadow:
        0 0 20px #ff3b8d,
        0 0 60px rgba(255, 60, 130, 0.9),
        0 0 120px rgba(255, 60, 130, 0.6);
      position: relative;
      z-index: 5;
      top: -70px;

}
    }
  </style>
</head>

<body>

  <main class="reward-page">

    <div class="agent-card">
      <h2 id="agentName">REYNA</h2>
      <img id="agentImg" src="" alt="Vybraný agent">
      <p id="agentText">Main character danger. Don’t challenge.</p>
    </div>

    <div class="balloons left">
      <div class="balloon purple"></div>
      <div class="balloon dark"></div>
      <div class="balloon"></div>
    </div>

    <div class="balloons right">
      <div class="balloon purple"></div>
      <div class="balloon dark"></div>
      <div class="balloon"></div>
    </div>

    <div class="gifts">
      <div class="gift"></div>
      <div class="gift"></div>
    </div>

    <section class="content">
      <div class="top-text">— ♛ MISSION COMPLETE —</div>

      <h1>HAPPY BIRTHDAY!</h1>

      <div class="age">19</div>

      <div class="cake">
        <div class="candles">
          <div class="candle"></div>
          <div class="candle"></div>
          <div class="candle"></div>
          <div class="candle"></div>
          <div class="candle"></div>
        </div>
        <div class="logo">KIKI</div>
      </div>

      <div class="level">✦✦✦✦✦✦</div>

      <div class="message">
        Another year of being iconic.<br>
        Keep slaying, keep shining.
      </div>

      <button class="enjoy" onclick="goHome()">✦ ENJOY YOUR DAY! ✦</button>
    </section>

  </main>

  <script>
    const agents = {
      MIKS: {
        img: "img/Miks.png",
        text: "Set the tempo. They follow my beat."
      },
      CLOVE: {
        img: "img/Clove.png",
        text: "Back again. Still causing trouble."
      },
      SAGE: {
        img: "img/Sage.png",
        text: "Support queen a calm energy."
      },
      REYNA: {
        img: "img/Reyna.png",
        text: "Main character danger. Don’t challenge."
      }
    };

    const selectedAgent = localStorage.getItem("selectedAgent") || "REYNA";
    const agent = agents[selectedAgent] || agents.REYNA;

    document.getElementById("agentName").textContent = selectedAgent;
    document.getElementById("agentImg").src = agent.img;
    document.getElementById("agentText").textContent = agent.text;

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
